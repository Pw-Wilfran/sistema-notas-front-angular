<div class="min-h-screen bg-[#f4f7fb] text-slate-700 p-4 lg:p-8">

    <div class="max-w-6xl mx-auto">

        <!-- HEADER -->
        <div class="bg-white border border-slate-200 rounded-3xl p-6 lg:p-8 shadow-sm mb-6">

            <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

                <div>

                    <p class="uppercase tracking-[0.2em] text-xs font-semibold text-slate-400">
                        Gestión académica
                    </p>

                    <h1 class="text-3xl font-bold tracking-tight text-slate-800 mt-2">
                        Nuevo estudiante
                    </h1>

                    <p class="text-sm text-slate-500 mt-2 max-w-2xl">
                        Registra un nuevo estudiante dentro del sistema institucional.
                    </p>

                </div>

                <div class="flex items-center gap-4 bg-slate-50 border border-slate-200 rounded-2xl px-5 py-4">

                    <div
                        class="w-14 h-14 rounded-2xl bg-slate-900 text-white flex items-center justify-center text-lg font-bold">
                        E
                    </div>

                    <div>

                        <p class="text-xs uppercase tracking-wide text-slate-400 font-semibold">
                            Tipo
                        </p>

                        <h3 class="font-semibold text-slate-800">
                            Estudiante
                        </h3>

                        <p class="text-sm text-slate-500">
                            Registro académico
                        </p>

                    </div>

                </div>

            </div>

        </div>

        <!-- FORM -->
        <form [formGroup]="form" (ngSubmit)="onSubmit()">

            <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">

                <!-- SECTION HEADER -->
                <div class="px-6 lg:px-8 py-5 border-b border-slate-100 bg-slate-50">

                    <h2 class="text-lg font-semibold text-slate-800">
                        Información general
                    </h2>

                    <p class="text-sm text-slate-500 mt-1">
                        Completa los datos personales y académicos.
                    </p>

                </div>

                <!-- BODY -->
                <div class="p-6 lg:p-8 space-y-10">

                    <!-- USER DATA -->
                    <div>

                        <div class="mb-6">

                            <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-400">
                                Datos de acceso
                            </h3>

                        </div>

                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

                            <!-- NAME -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Nombre
                                </label>

                                <input type="text" placeholder="Juan" formControlName="name"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- LAST NAME -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Apellido
                                </label>

                                <input type="text" placeholder="Pérez" formControlName="last_name"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- EMAIL -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Correo electrónico
                                </label>

                                <input type="email" placeholder="correo@institucion.com" formControlName="email"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- USERNAME -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Usuario
                                </label>

                                <input type="text" placeholder="juan.perez" formControlName="username"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm font-mono focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- PASSWORD -->
                            <div class="xl:col-span-2">

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Contraseña
                                </label>

                                <input type="password" placeholder="••••••••" formControlName="password"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                        </div>

                    </div>

                    <!-- STUDENT DATA -->
                    <div>

                        <div class="mb-6">

                            <h3 class="text-sm font-semibold uppercase tracking-wide text-slate-400">
                                Información del estudiante
                            </h3>

                        </div>

                        <div class="grid grid-cols-1 xl:grid-cols-2 gap-6">

                            <!-- DOCUMENT -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Documento
                                </label>

                                <input type="text" placeholder="1002456789" formControlName="document"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- BIRTH -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Fecha de nacimiento
                                </label>

                                <input type="date" formControlName="birth_date"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- PHONE -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Teléfono
                                </label>

                                <input type="text" placeholder="+57 300 000 0000" formControlName="phone"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

                            </div>

                            <!-- STATUS -->
                            <div>

                                <label class="block text-sm font-medium text-slate-600 mb-2">
                                    Estado
                                </label>

                                <select formControlName="is_active"
                                    class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition">
                                    <option value="true">Activo</option>
                                    <option value="false">Inactivo</option>
                                </select>

                            </div>

                        </div>

                    </div>

                </div>

                <!-- FOOTER -->
                <div
                    class="flex flex-col-reverse sm:flex-row sm:items-center sm:justify-end gap-3 border-t border-slate-100 bg-slate-50 px-6 lg:px-8 py-5">

                    <button type="button"
                        class="h-11 px-5 rounded-xl border border-slate-200 bg-white hover:bg-slate-100 transition text-sm font-medium text-slate-600">
                        Cancelar
                    </button>

                    <button type="submit"
                        class="h-11 px-6 rounded-xl bg-slate-900 hover:bg-slate-800 transition text-sm font-semibold text-white shadow-lg shadow-slate-900/10">
                        Crear estudiante
                    </button>

                </div>

            </div>

        </form>

    </div>

</div>
