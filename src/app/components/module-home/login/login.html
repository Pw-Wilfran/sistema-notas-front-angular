<body class="bg-[#0B0F1A] min-h-screen flex items-center justify-center p-4 font-sans text-slate-300">
  <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-2 bg-[#161B22] rounded-[3rem] overflow-hidden shadow-[0_0_100px_rgba(0,0,0,0.5)] border border-slate-800">
    
    <!-- Lado Izquierdo: Formulario -->
    <div class="p-10 md:p-16 flex flex-col justify-center">
      <div class="flex items-center gap-2 mb-12">
        <div class="h-8 w-8 bg-cyan-500 rounded-lg shadow-[0_0_15px_rgba(6,182,212,0.5)]"></div>
        <span class="text-white font-bold text-xl tracking-tight">EduNexus<span class="text-cyan-500">.</span></span>
      </div>

      <h2 class="text-4xl font-bold text-white mb-4">Ingreso seguro</h2>
      <p class="text-slate-500 mb-10">Gestiona el rendimiento académico de tu institución.</p>

      <form class="space-y-6">
        <div class="space-y-2">
          <label class="text-xs uppercase tracking-widest font-bold text-slate-500 ml-1">Identificación</label>
          <div class="relative group">
            <input type="text" class="w-full bg-[#0B0F1A] border border-slate-700 py-4 px-5 rounded-2xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all text-white" placeholder="ID o Correo">
          </div>
        </div>

        <div class="space-y-2">
          <label class="text-xs uppercase tracking-widest font-bold text-slate-500 ml-1">Contraseña</label>
          <input type="password" class="w-full bg-[#0B0F1A] border border-slate-700 py-4 px-5 rounded-2xl focus:border-cyan-500 focus:ring-1 focus:ring-cyan-500 outline-none transition-all text-white" placeholder="••••••••">
        </div>

        <button class="w-full bg-gradient-to-r from-cyan-600 to-blue-600 hover:from-cyan-500 hover:to-blue-500 text-white font-bold py-4 rounded-2xl shadow-lg shadow-cyan-900/20 transition-all transform hover:-translate-y-1">
          Acceder al Panel
        </button>
      </form>

      <div class="mt-10 pt-10 border-t border-slate-800 flex justify-between items-center">
        <a href="#" class="text-sm text-slate-500 hover:text-cyan-400 transition-colors">¿Problemas técnicos?</a>
        <button class="text-sm font-bold text-white bg-slate-800 px-4 py-2 rounded-xl hover:bg-slate-700 transition-all">Registrar Colegio</button>
      </div>
    </div>

    <!-- Lado Derecho: Preview Visual (Hidden en móviles) -->
    <div class="hidden lg:flex bg-[#0D1117] p-12 relative items-center justify-center overflow-hidden border-l border-slate-800">
      <!-- Decoración abstracta de fondo -->
      <div class="absolute top-20 right-20 w-64 h-64 bg-cyan-500/10 rounded-full blur-[100px]"></div>
      <div class="absolute bottom-20 left-20 w-64 h-64 bg-purple-500/10 rounded-full blur-[100px]"></div>

      <!-- Tarjeta Flotante (UI Preview) -->
      <div class="relative z-10 bg-[#161B22]/80 backdrop-blur-xl border border-slate-700 p-6 rounded-3xl w-full max-w-xs shadow-2xl">
        <div class="flex items-center justify-between mb-6">
          <div class="h-3 w-20 bg-slate-700 rounded-full"></div>
          <div class="h-8 w-8 bg-cyan-500/20 rounded-full flex items-center justify-center">
              <div class="h-4 w-4 bg-cyan-500 rounded-full"></div>
          </div>
        </div>
        <div class="space-y-4">
          <div class="h-12 w-full bg-slate-800/50 rounded-xl flex items-center px-4 gap-3">
            <div class="h-6 w-6 bg-emerald-500/20 rounded-lg"></div>
            <div class="h-2 w-24 bg-slate-600 rounded-full"></div>
          </div>
          <div class="h-12 w-full bg-slate-800/50 rounded-xl flex items-center px-4 gap-3 border-l-4 border-cyan-500">
            <div class="h-6 w-6 bg-cyan-500/20 rounded-lg"></div>
            <div class="h-2 w-32 bg-slate-600 rounded-full"></div>
          </div>
          <div class="h-12 w-full bg-slate-800/50 rounded-xl flex items-center px-4 gap-3">
            <div class="h-6 w-6 bg-purple-500/20 rounded-lg"></div>
            <div class="h-2 w-20 bg-slate-600 rounded-full"></div>
          </div>
        </div>
        <div class="mt-6 p-4 bg-cyan-500 rounded-2xl text-center text-xs font-black text-[#0B0F1A] uppercase tracking-tighter">
          Generar Boletines
        </div>
        <a routerLink="/register">regitrarse</a>
      </div>
    </div>
  </div>
</body>
