<!-- login.component.html -->
<div class="flex min-h-screen font-sans bg-white">
  <!-- FORMULARIO -->
  <div class="w-full lg:w-1/3 flex items-center justify-center px-6 lg:px-10">
    <!-- CONTENEDOR CENTRADO -->
    <div
      class="w-full max-w-sm flex flex-col justify-between min-h-[80vh] py-10"
    >
      <!-- BLOQUE SUPERIOR -->
      <div>
        <!-- Logo -->
        <img src="assets/411745.png" alt="Logo" class="h-10 w-auto mb-8" />

        <!-- Título -->
        <h1 class="text-3xl font-semibold text-gray-800 mb-2">Login</h1>

        <p class="text-sm text-gray-500 mb-8">
          Don’t have an account?
          <a
            routerLink="/register"
            class="text-orange-600 font-medium hover:underline"
          >
            Get Started
          </a>
        </p>

        <!-- FORM -->
        <form class="space-y-6" (ngSubmit)="Acceder()">
          <!-- Email -->
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Email Address
            </label>

            <input
              type="text"
              [(ngModel)]="login"
              name="email"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Password
            </label>

            <input
              type="password"
              [(ngModel)]="password"
              name="password"
              required
              class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
            />
          </div>

          <!-- ERROR -->
          @if (error) {
            <p class="text-red-500 text-sm">
              {{ error }}
            </p>
          }

          <!-- Opciones -->
          <div class="flex items-center justify-between pt-1">
            <a href="#" class="text-sm text-orange-600 hover:underline">
              Forgot to password?
            </a>
          </div>
          
          <!-- Botón -->
          <button
            type="submit"
            class="w-full bg-[#E54D26] hover:bg-[#c43d1c] text-white font-semibold py-3 rounded-md transition-all duration-200 shadow-sm hover:shadow-md active:scale-[0.99] uppercase tracking-wide text-sm"
          >
            Log In
          </button>
        </form>

        <!-- register link -->
        <div class="mt-15 text-center">
          <p class="text-sm text-gray-500">
            No tienes Cuenta Registrate?
            <a
              routerLink="/register"
              class="text-orange-600 font-medium hover:underline"
            >
              Registrarme
            </a>
          </p>
        </div>
      </div>

      <!-- FOOTER (pegado abajo pero alineado) -->
      <div class="text-[11px] text-gray-400 text-center leading-relaxed mt-5">
        <p>© 2026 YourApp, LLC.</p>
        <div class="space-x-2 mt-1">
          <a href="#" class="hover:underline">Terms</a>
          <span>|</span>
          <a href="#" class="hover:underline">Privacy</a>
        </div>
      </div>
    </div>
  </div>

  <!-- IMAGEN -->
  <div class="hidden lg:block lg:w-2/3 relative">
    <div
      class="absolute inset-0 bg-cover bg-center"
      style="background-image: url(&quot;assets/login.jpg&quot;)"
    ></div>

    <div
      class="absolute inset-0 bg-gradient-to-br from-black/20 via-transparent to-black/30"
    ></div>

    <div class="absolute bottom-12 left-12 text-white max-w-sm">
      <h2 class="text-xl font-semibold mb-2">Plataforma Académica</h2>
      <p class="text-sm text-white/80">
        Gestiona estudiantes, notas y reportes en un solo sistema.
      </p>
    </div>
  </div>
</div>
