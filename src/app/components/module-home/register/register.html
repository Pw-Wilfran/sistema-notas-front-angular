<!-- register.component.html -->
<div class="flex flex-row-reverse min-h-screen font-sans bg-white">
  <!-- FORMULARIO -->
  <div class="w-full lg:w-1/3 flex items-center justify-center px-6 lg:px-10">
    <!-- CONTENEDOR -->
    <div
      class="w-full max-w-sm flex flex-col justify-between min-h-[85vh] py-10"
    >
      <!-- BLOQUE SUPERIOR -->
      <div>
        <!-- Logo opcional (mantiene consistencia con login) -->
        <img src="assets/411745.png" alt="Logo" class="h-10 w-auto mb-6" />

        <!-- Título -->
        <h1 class="text-3xl font-semibold text-gray-800 mb-2">
          Create Account
        </h1>

        <p class="text-sm text-gray-500 mb-8">
          Join the platform and start managing your institution.
        </p>

        <!-- FORM -->
        <form (ngSubmit)="register()" class="space-y-5">
          
          <!-- Nombre y Apellido -->
          <div class="grid grid-cols-2 gap-4">
            <div>
              <label
                class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
              >
                First Name
              </label>
              <input
                [(ngModel)]="name"
                name="name"
                required
                placeholder="Nombre"
                class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
              />
            </div>

            <div>
              <label
                class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
              >
                Last Name
              </label>
              <input
                [(ngModel)]="last_name"
                name="last_name"
                required
                placeholder="Apellido"
                class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
              />
            </div>
          </div>

          <!-- Username -->
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Username
            </label>
            <input
              [(ngModel)]="username"
              name="username"
              required
              placeholder="Username"
              class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
            />
          </div>

          <!-- Email -->
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Email
            </label>
            <input
              [(ngModel)]="email"
              name="email"
              type="email"
              required
              placeholder="Email"
              class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
            />
          </div>

          <!-- Password -->
          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Password
            </label>
            <input
              [(ngModel)]="password"
              name="password"
              type="password"
              required
              placeholder="Password"
              class="w-full px-4 py-3 border border-gray-300 rounded-md focus:ring-2 focus:ring-orange-500/20 focus:border-orange-500 outline-none transition text-sm"
            />
          </div>

          <div>
            <label
              class="block text-xs font-semibold text-gray-600 mb-2 uppercase tracking-wide"
            >
              Rol
            </label>
            <select [(ngModel)]="form.role_id " name="role_id">
              <option *ngFor="let role of roles" [value]="role.id">
                {{ role.name }}
              </option>
            </select>
          </div>

          @if (error) {
            <p class="text-red-500 text-sm">
              {{ error }}
            </p>
          }

          @if (success) {
            <p class="text-green-500 text-sm">
              {{ success }}
            </p>
          }

          <!-- Botón -->
          <button
            type="submit"
            class="w-full bg-[#E54D26] hover:bg-[#c43d1c] text-white font-semibold py-3 rounded-md transition-all duration-200 shadow-sm hover:shadow-md active:scale-[0.99] uppercase tracking-wide text-sm mt-2"
          >
            Registrarse
          </button>
        </form>

        <!-- Login link -->
        <div class="mt-6 text-center">
          <p class="text-sm text-gray-500">
            Already have an account?
            <a
              routerLink="/login"
              class="text-orange-600 font-medium hover:underline"
            >
              Login
            </a>
          </p>
        </div>
      </div>

      <!-- FOOTER -->
      <div class="text-[11px] text-gray-400 text-center mt-10">
        <p>© 2026 YourApp, LLC.</p>
      </div>
    </div>
  </div>

  <!-- IMAGEN -->
  <div class="hidden lg:block lg:w-2/3 relative">
    <!-- Imagen -->
    <div
      class="absolute inset-0 bg-cover bg-center"
      style="background-image: url(&quot;assets/login.jpg&quot;)"
    ></div>

    <!-- Overlay -->
    <div
      class="absolute inset-0 bg-gradient-to-br from-black/20 via-transparent to-black/30"
    ></div>

    <!-- Texto -->
    <div class="absolute bottom-12 left-12 text-white max-w-sm">
      <h2 class="text-xl font-semibold mb-2">Gestión Inteligente</h2>
      <p class="text-sm text-white/80">
        Crea tu cuenta y comienza a administrar tu institución de manera
        eficiente.
      </p>
    </div>
  </div>
</div>
