<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registro | NoteSystem Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass-effect { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body class="bg-[#0f172a] min-h-screen flex items-center justify-center p-6">

    <!-- Decoración de fondo minimalista -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden z-0">
        <div class="absolute top-[-10%] left-[-10%] w-[40%] h-[40%] bg-emerald-500/10 rounded-full blur-[120px]"></div>
        <div class="absolute bottom-[-10%] right-[-10%] w-[40%] h-[40%] bg-blue-600/10 rounded-full blur-[120px]"></div>
    </div>

    <div class="relative z-10 w-full max-w-5xl flex bg-white rounded-3xl shadow-2xl overflow-hidden border border-slate-200">
        
        <!-- Lateral de Marca (35%) -->
        <div class="hidden lg:flex lg:w-1/3 bg-slate-50 border-r border-slate-100 p-12 flex-col justify-between">
            <div>
                <div class="flex items-center gap-2 mb-8">
                    <div class="w-8 h-8 bg-emerald-500 rounded-lg flex items-center justify-center shadow-lg shadow-emerald-500/30">
                        <svg class="w-5 h-5 text-white" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 morning-2 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path></svg>
                    </div>
                    <span class="text-xl font-bold text-slate-800 tracking-tight">NoteFlow <span class="text-emerald-500 text-xs align-top">PRO</span></span>
                </div>
                <h2 class="text-3xl font-bold text-slate-900 leading-tight">Organiza tus ideas con precisión quirúrgica.</h2>
            </div>

            <div class="space-y-6">
                <div class="flex items-start gap-4">
                    <div class="text-emerald-500 mt-1"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg></div>
                    <p class="text-sm text-slate-600"><strong>Espacios colaborativos:</strong> Comparte notas con tu equipo empresarial.</p>
                </div>
                <div class="flex items-start gap-4">
                    <div class="text-emerald-500 mt-1"><svg class="w-5 h-5" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zm3.707-9.293a1 1 0 00-1.414-1.414L9 10.586 7.707 9.293a1 1 0 00-1.414 1.414l2 2a1 1 0 001.414 0l4-4z"></path></svg></div>
                    <p class="text-sm text-slate-600"><strong>Cifrado E2E:</strong> Seguridad de nivel bancario para tus datos.</p>
                </div>
            </div>
        </div>

        <!-- Formulario Principal (65%) -->
        <div class="w-full lg:w-2/3 p-8 md:p-16">
            <header class="mb-10">
                <h1 class="text-2xl font-bold text-slate-800">Crea tu cuenta empresarial</h1>
                <p class="text-slate-500">Únete a más de 10,000 profesionales.</p>
            </header>

            <form action="#" method="POST" class="space-y-6">
                <!-- Grid complejo para romper la monotonía -->
                <div class="grid grid-cols-1 md:grid-cols-6 gap-6">
                    
                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Nombre</label>
                        <input type="text" name="first_name" required placeholder="John" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all">
                    </div>

                    <div class="md:col-span-3">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Apellido</label>
                        <input type="text" name="last_name" required placeholder="Doe" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all">
                    </div>

                    <div class="md:col-span-2">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Username</label>
                        <div class="relative">
                            <span class="absolute inset-y-0 left-4 flex items-center text-slate-400 font-medium">@</span>
                            <input type="text" name="username" required placeholder="jdoe" 
                                class="w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-4 py-3 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all text-emerald-700 font-medium">
                        </div>
                    </div>

                    <div class="md:col-span-4">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Email Corporativo</label>
                        <input type="email" name="email" required placeholder="john@empresa.com" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all">
                    </div>

                    <div class="md:col-span-6">
                        <label class="block text-xs font-bold uppercase tracking-wider text-slate-400 mb-2">Contraseña</label>
                        <input type="password" name="password" required placeholder="Mínimo 6 caracteres" 
                            class="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-3 focus:bg-white focus:border-emerald-500 focus:ring-4 focus:ring-emerald-500/10 outline-none transition-all">
                    </div>
                </div>

                <div class="flex items-center gap-2 pt-2">
                    <input type="checkbox" id="terms" required class="w-4 h-4 rounded border-slate-300 text-emerald-600 focus:ring-emerald-500">
                    <label for="terms" class="text-xs text-slate-500">Acepto los términos de servicio y políticas de privacidad corporativas.</label>
                </div>

                <div class="flex flex-col md:flex-row items-center gap-4 pt-4">
                    <button type="submit" class="w-full md:w-auto px-8 py-3 bg-slate-900 hover:bg-slate-800 text-white font-bold rounded-xl shadow-xl transition-all active:scale-95">
                        Crear cuenta profesional
                    </button>
                    <span class="text-slate-400 text-sm italic">o regístrate con SSO</span>
                </div>
            </form>
        </div>
    </div>
</body>
</html>
