<div class="min-h-screen bg-[#f4f7fb] p-4 lg:p-8">

  <div class="max-w-5xl mx-auto">

    <!-- HEADER -->
    <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden mb-6">

      <div class="p-6 lg:p-8">

        <div class="flex flex-col lg:flex-row lg:items-center lg:justify-between gap-6">

          <div>

            <div class="flex items-center gap-3 mb-3">

              <a routerLink="/students"
                class="w-10 h-10 rounded-2xl border border-slate-200 flex items-center justify-center hover:bg-slate-100 transition">
                <svg class="w-5 h-5 text-slate-600" fill="none" stroke="currentColor" stroke-width="2"
                  viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" />
                </svg>
              </a>

              <span class="px-3 py-1 rounded-full bg-blue-100 text-blue-700 text-xs font-semibold">
                Nuevo estudiante
              </span>

            </div>

            <h1 class="text-3xl font-bold tracking-tight text-slate-800">
              Registrar estudiante
            </h1>

            <p class="text-slate-500 mt-2">
              Completa la información personal y académica.
            </p>

          </div>

        </div>

      </div>

    </div>

    <!-- ERROR -->
    <div *ngIf="error" class="mb-6 bg-red-50 border border-red-200 rounded-2xl px-5 py-4 flex items-start gap-3">

      <svg class="w-5 h-5 text-red-500 mt-0.5 shrink-0" fill="none" stroke="currentColor" stroke-width="2"
        viewBox="0 0 24 24">
        <circle cx="12" cy="12" r="10" />
        <path stroke-linecap="round" d="M12 8v4m0 4h.01" />
      </svg>

      <div>
        <p class="text-sm font-medium text-red-700">
          {{ error }}
        </p>
      </div>

    </div>

    <!-- FORM -->
    <form [formGroup]="form" (ngSubmit)="onSubmit()" class="space-y-6">

      <!-- PERSONAL -->
      <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">

        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">

          <h2 class="text-lg font-semibold text-slate-800">
            Información personal
          </h2>

          <p class="text-sm text-slate-500 mt-1">
            Datos principales del estudiante.
          </p>

        </div>

        <div class="p-6 lg:p-8">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- NAME -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Nombre
              </label>

              <input type="text" formControlName="name" placeholder="Juan"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

              <p *ngIf="form.get('name')?.invalid && form.get('name')?.touched" class="text-xs text-red-500 mt-2">
                El nombre es obligatorio.
              </p>

            </div>

            <!-- LAST NAME -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Apellido
              </label>

              <input type="text" formControlName="last_name" placeholder="Pérez"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- DOCUMENT -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Documento
              </label>

              <input type="text" formControlName="document" placeholder="1002456789"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- BIRTH DATE -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Fecha de nacimiento
              </label>

              <input type="date" formControlName="birth_date"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- PHONE -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Teléfono
              </label>

              <input type="text" formControlName="phone" placeholder="+57 300 000 0000"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- ACTIVE -->
            <div class="flex items-center justify-between">

              <div>

                <p class="text-sm font-medium text-slate-700">
                  Estudiante activo
                </p>

                <p class="text-xs text-slate-500 mt-1">
                  Puede acceder al sistema
                </p>

              </div>

              <button type="button" (click)="form.get('is_active')?.setValue(!form.get('is_active')?.value)" [class]="
                  'relative inline-flex h-7 w-12 items-center rounded-full transition ' +
                  (form.get('is_active')?.value
                    ? 'bg-slate-900'
                    : 'bg-slate-300')
                ">

                <span [class]="
                    'inline-block h-5 w-5 transform rounded-full bg-white transition ' +
                    (form.get('is_active')?.value
                      ? 'translate-x-6'
                      : 'translate-x-1')
                  "></span>

              </button>

            </div>

          </div>

        </div>

      </div>

      <!-- ACCOUNT -->
      <div class="bg-white border border-slate-200 rounded-3xl shadow-sm overflow-hidden">

        <div class="px-6 py-5 border-b border-slate-100 bg-slate-50">

          <h2 class="text-lg font-semibold text-slate-800">
            Cuenta de acceso
          </h2>

          <p class="text-sm text-slate-500 mt-1">
            Credenciales para ingresar al sistema.
          </p>

        </div>

        <div class="p-6 lg:p-8">

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

            <!-- EMAIL -->
            <div class="md:col-span-2">

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Correo electrónico
              </label>

              <input type="email" formControlName="email" placeholder="juan@email.com"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- USERNAME -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Usuario
              </label>

              <input type="text" formControlName="username" placeholder="juanperez"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm font-mono focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

            <!-- PASSWORD -->
            <div>

              <label class="block text-sm font-medium text-slate-600 mb-2">
                Contraseña
              </label>

              <input type="password" formControlName="password" placeholder="••••••••"
                class="w-full h-12 rounded-2xl border border-slate-200 bg-slate-50 px-4 text-sm focus:outline-none focus:ring-4 focus:ring-slate-200 transition" />

            </div>

          </div>

        </div>

      </div>

      <!-- ACTIONS -->
      <div class="bg-white border border-slate-200 rounded-3xl shadow-sm p-6">

        <div class="flex flex-col sm:flex-row items-stretch sm:items-center justify-end gap-4">

          <a routerLink="/students"
            class="h-12 px-6 rounded-2xl border border-slate-200 bg-white hover:bg-slate-100 transition text-sm font-medium text-slate-600 flex items-center justify-center">
            Cancelar
          </a>

          <button type="submit" [disabled]="loading"
            class="h-12 px-6 rounded-2xl bg-slate-900 hover:bg-slate-800 disabled:opacity-60 disabled:cursor-not-allowed transition text-sm font-semibold text-white shadow-lg shadow-slate-900/10 flex items-center justify-center gap-3">

            <svg *ngIf="loading" class="w-4 h-4 animate-spin" fill="none" viewBox="0 0 24 24">
              <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>

              <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8v8z"></path>
            </svg>

            {{ loading ? 'Guardando...' : 'Registrar estudiante' }}

          </button>

        </div>

      </div>

    </form>

  </div>

</div>
