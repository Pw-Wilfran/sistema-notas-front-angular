<!-- OVERLAY MOBILE -->
<div
  (click)="closeSidebar()"

  [class.opacity-0]="!sidebarService.opened"
  [class.pointer-events-none]="!sidebarService.opened"

></div>

<!-- SIDEBAR -->
<aside
  class="fixed lg:relative top-16 lg:top-0 left-0 z-40 h-[calc(100vh-64px)] lg:h-full bg-gray-100  transition-all duration-300 ease-in-out overflow-hidden flex flex-col"

  [class.w-0]="!sidebarService.opened && sidebarService.mobile"

  [class.w-[85px]]="!sidebarService.opened && !sidebarService.mobile"

  [class.w-[280px]]="sidebarService.opened"

  [class.-translate-x-full]="!sidebarService.opened && sidebarService.mobile"

  [class.translate-x-0]="sidebarService.opened"

  lg:translate-x-0

                        <path
                          d="M12.8333 16.3333H14V21M18.6667 2.33331V6.99998M3.5 11.6666H24.5M9.33333 2.33331V6.99998M5.83333 4.66665H22.1667C23.4553 4.66665 24.5 5.71132 24.5 6.99998V23.3333C24.5 24.622 23.4553 25.6666 22.1667 25.6666H5.83333C4.54467 25.6666 3.5 24.622 3.5 23.3333V6.99998C3.5 5.71132 4.54467 4.66665 5.83333 4.66665Z"

            >
              <div class="flex items-center justify-center min-w-[24px]">
                <svg
                  (click)="toggleSidebar()"
                  xmlns="http://www.w3.org/2000/svg"
                  width="24"
                  height="24"
                  fill="currentColor"
                  class="bi bi-person-check"
                  viewBox="0 0 16 16"
                >
                  <path
                    d="M12.5 16a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7m1.679-4.493-1.335 2.226a.75.75 0 0 1-1.174.144l-.774-.773a.5.5 0 0 1 .708-.708l.547.548 1.17-1.951a.5.5 0 1 1 .858.514M11 5a3 3 0 1 1-6 0 3 3 0 0 1 6 0M8 7a2 2 0 1 0 0-4 2 2 0 0 0 0 4"

                class="text-base font-semibold whitespace-nowrap transition-all duration-200"
                [class.opacity-0]="!(sidebarService.isOpen$ | async)"
                [class.w-0]="!(sidebarService.isOpen$ | async)"
                [class.overflow-hidden]="!(sidebarService.isOpen$ | async)"
              >
                Matricula
              </span>
            </button>
          </li>

          <!--evaluacion-->
          <li>
            <input
              type="checkbox"
              id="evaluacion_dropdown"
              class="peer hidden"
            />

            <label
              for="evaluacion_dropdown"
              class="group flex items-center justify-between w-full gap-4 px-4 py-3 rounded-2xl text-gray-700 cursor-pointer hover:bg-blue-50 hover:text-blue-600 transition-all duration-200"

              <div class="flex items-center gap-4 min-w-0">
                <div class="flex items-center justify-center min-w-[24px]">
                  <svg
                    (click)="toggleSidebar()"
                    xmlns="http://www.w3.org/2000/svg"
                    class="w-6 h-6 transition-transform duration-200 group-hover:scale-110"
                    fill="currentColor"
                    viewBox="0 0 24 24"
                  >
                    <path
                      d="M12 2a5 5 0 1 0 5 5 5 5 0 0 0-5-5zm0 8a3 3 0 1 1 3-3 3 3 0 0 1-3 3zm9 11v-1a7 7 0 0 0-7-7h-4a7 7 0 0 0-7 7v1h2v-1a5 5 0 0 1 5-5h4a5 5 0 0 1 5 5v1z"
                    ></path>
                  </svg>
                </div>

                <span
                  class="text-base font-semibold whitespace-nowrap transition-all duration-200"

                <path
                  stroke-linecap="round"
                  stroke-linejoin="round"
                  stroke-width="2"
                  d="M19 9l-7 7-7-7"
                />
              </svg>
            </label>

            <!-- SUBMENU -->
            <div
              class="grid transition-all duration-300 grid-rows-[0fr] peer-checked:grid-rows-[1fr]"
              [class.hidden]="!(sidebarService.isOpen$ | async)"
            >
              <div class="overflow-hidden">
                <div class="mt-1 ml-11 flex flex-col gap-1 pl-4">
                  <button
                    routerLink="/user"
                    class="flex items-center w-full px-4 py-2 rounded-xl text-base text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all duration-200"

                    Actividades
                  </button>

                  <button
                    class="flex items-center w-full px-4 py-2 rounded-xl text-base text-gray-600 hover:bg-emerald-50 hover:text-emerald-600 transition-all duration-200"

                  </button>
                </div>
              </div>

              <span

                [class.w-0]="!(sidebarService.isOpen$ | async)"
                [class.overflow-hidden]="!(sidebarService.isOpen$ | async)"
              >
                Asistencia
              </span>
            </button>
          </li>

          <!--resultados-->
          <li>
            <button
              class="group flex items-center w-full gap-4 px-4 py-3 rounded-2xl text-gray-700 hover:bg-emerald-50 hover:text-emerald-600 transition-all duration-200"

              <span
                class="text-base font-semibold whitespace-nowrap transition-all duration-200"
